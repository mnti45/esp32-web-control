<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send Message to ESP32</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    input, button {
      margin: 10px;
      padding: 10px;
      font-size: 16px;
    }
    button {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Send Text to ESP32</h1>
  <p>Enter your message below and click send:</p>
  <input type="text" id="message" placeholder="Enter your message" size="30">
  <button onclick="sendMessage()">Send</button>
  <p id="status"></p>

  <script>
    // Địa chỉ IP của ESP32 (thay bằng địa chỉ IP ESP32 của bạn)
    const esp32Ip = "http://192.168.1.23";  // Địa chỉ IP của ESP32 mà bạn thấy trong Serial Monitor

    // Function to send message
    function sendMessage() {
      const message = document.getElementById("message").value;
      if (!message) {
        alert("Please enter a message!");
        return;
      }

      // Tạo yêu cầu HTTP POST để gửi tin nhắn đến ESP32
      fetch(esp32Ip + "/message", {
        method: "POST",
        body: new URLSearchParams({ message: message })
      })
      .then(response => response.text())
      .then(data => {
        console.log("Message sent:", message);
        document.getElementById("status").innerText = "Message sent: " + message;
        document.getElementById("message").value = "";  // Xóa ô nhập liệu
      })
      .catch(error => {
        console.error("Error sending message:", error);
        document.getElementById("status").innerText = "Failed to send message.";
      });
    }
  </script>
</body>
</html>
