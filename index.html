<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dải Ngân Hà Của Chúng Mình</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #01010a;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      touch-action: none;
    }

    #space3d {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      z-index: 1;
      background: radial-gradient(circle at center, #171044 0%, #050415 44%, #010108 100%);
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 28%, rgba(0,0,20,.22) 68%, rgba(0,0,0,.64) 100%),
        linear-gradient(180deg, rgba(0,0,0,.1), rgba(0,0,0,.1));
    }

    .top-text {
      position: fixed;
      z-index: 7;
      top: 18px;
      left: 12px;
      right: 12px;
      text-align: center;
      pointer-events: none;
      transition: opacity .55s ease, transform .55s ease;
    }

    .top-text.hide {
      opacity: 0;
      transform: translateY(-22px);
    }

    .title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-size: clamp(30px, 9vw, 52px);
      line-height: 1.02;
      font-weight: 400;
      color: #ffe5f7;
      text-shadow:
        0 0 7px #fff,
        0 0 22px #ff65d2,
        0 0 50px rgba(125, 205, 255, .85);
    }

    .subtitle {
      margin: 11px auto 0;
      max-width: 370px;
      font-size: clamp(14px, 3.9vw, 18px);
      line-height: 1.45;
      color: rgba(255,255,255,.84);
      text-shadow: 0 0 14px rgba(160,210,255,.75);
    }

    .photo-star {
      position: fixed;
      z-index: 4;
      left: 0;
      top: 0;
      width: 90px;
      height: 90px;
      border-radius: 22px;
      overflow: hidden;
      background: rgba(255,255,255,.12);
      border: 1.5px solid rgba(255,230,250,.82);
      box-shadow:
        0 0 10px rgba(255,255,255,.55),
        0 0 28px rgba(255,90,210,.55),
        0 0 58px rgba(90,170,255,.28);
      transform-origin: center;
      pointer-events: auto;
      opacity: .2;
      transition: opacity .2s ease, filter .2s ease;
      will-change: transform, opacity;
    }

    .photo-star::before {
      content: "";
      position: absolute;
      inset: -12px;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.42), transparent 28%),
        radial-gradient(circle at 20% 10%, rgba(255,130,220,.35), transparent 32%);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .photo-star::after {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: inherit;
      border: 1px solid rgba(255,255,255,.38);
      box-shadow: inset 0 0 22px rgba(255,255,255,.16);
      pointer-events: none;
    }

    .photo-star img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.08) contrast(1.04);
    }

    .photo-star.near {
      opacity: 1;
      filter: drop-shadow(0 0 18px rgba(255,255,255,.85));
    }

    .center-photo {
      position: fixed;
      z-index: 6;
      left: 50%;
      top: 50%;
      width: min(62vw, 310px);
      height: min(62vw, 310px);
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: opacity .35s ease, transform .35s ease;
    }

    .center-photo.far {
      opacity: .72;
      transform: translate(-50%, -50%) scale(.72);
    }

    .main-ring {
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,230,250,.75);
      box-shadow:
        0 0 18px rgba(255,255,255,.45),
        0 0 52px rgba(255,80,205,.60),
        inset 0 0 30px rgba(255,255,255,.08);
      animation: spinRing 13s linear infinite;
    }

    .main-ring.two {
      inset: -32px;
      opacity: .42;
      animation-duration: 21s;
      animation-direction: reverse;
      border-color: rgba(125,205,255,.7);
    }

    @keyframes spinRing {
      to { transform: rotate(360deg); }
    }

    .main-img {
      position: absolute;
      inset: 8%;
      border-radius: 34px;
      overflow: hidden;
      border: 2px solid rgba(255,245,253,.96);
      box-shadow:
        0 0 24px rgba(255,255,255,.45),
        0 0 80px rgba(255,85,205,.56);
      background: #111;
      animation: floatMain 4.2s ease-in-out infinite;
    }

    @keyframes floatMain {
      0%,100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.025); }
    }

    .main-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .hint {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: 16px;
      z-index: 8;
      padding: 12px 14px;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,.82);
      background: rgba(255,255,255,.075);
      border: 1px solid rgba(255,255,255,.17);
      border-radius: 999px;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 22px rgba(255,100,210,.18);
      transition: opacity .5s ease, transform .5s ease;
    }

    .hint.hide {
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
    }

    .love-popup {
      position: fixed;
      z-index: 20;
      left: 50%;
      top: 50%;
      width: min(91vw, 395px);
      min-height: 270px;
      padding: 26px 22px;
      transform: translate(-50%, -50%) scale(.68) rotateX(22deg);
      opacity: 0;
      pointer-events: none;
      border-radius: 34px;
      text-align: center;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.23), transparent 32%),
        linear-gradient(145deg, rgba(255,55,180,.30), rgba(90,120,255,.22), rgba(255,255,255,.09));
      border: 1px solid rgba(255,235,252,.62);
      box-shadow:
        0 0 35px rgba(255,110,215,.60),
        inset 0 0 42px rgba(255,255,255,.10);
      backdrop-filter: blur(13px);
      transition: opacity .55s ease, transform .55s cubic-bezier(.2,1.2,.25,1);
    }

    .love-popup.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1) rotateX(0deg);
      pointer-events: auto;
    }

    .big-heart {
      font-size: 76px;
      line-height: 1;
      filter: drop-shadow(0 0 25px rgba(255,40,80,.98));
      animation: heartBeat 1.15s ease-in-out infinite;
    }

    @keyframes heartBeat {
      0%,100% { transform: scale(1); }
      30% { transform: scale(1.2); }
      52% { transform: scale(.98); }
      72% { transform: scale(1.13); }
    }

    .love-popup h2 {
      margin: 9px 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 38px;
      font-weight: 400;
      color: #fff0fb;
      text-shadow: 0 0 10px white, 0 0 25px #ff58c9;
      animation: text3d 2.6s ease-in-out infinite;
    }

    @keyframes text3d {
      0%,100% {
        transform: perspective(450px) rotateY(-7deg) translateZ(0);
        text-shadow: 0 0 10px #fff, 0 0 24px #ff58c9, 3px 3px 0 rgba(255,40,145,.30);
      }
      50% {
        transform: perspective(450px) rotateY(7deg) translateZ(22px);
        text-shadow: 0 0 14px #fff, 0 0 36px #7dd3ff, -3px 3px 0 rgba(120,160,255,.30);
      }
    }

    .love-popup p {
      margin: 12px auto 0;
      max-width: 330px;
      color: rgba(255,255,255,.9);
      font-size: 16px;
      line-height: 1.55;
    }

    .close-btn {
      margin-top: 18px;
      border: 0;
      border-radius: 999px;
      padding: 12px 20px;
      color: white;
      font-weight: 800;
      background: linear-gradient(90deg, #ff5fc8, #8b5cff);
      box-shadow: 0 0 18px rgba(255,90,210,.65);
    }

    .flying-heart {
      position: fixed;
      z-index: 21;
      pointer-events: none;
      font-size: 22px;
      animation: flyHeart 2.7s ease-out forwards;
      filter: drop-shadow(0 0 10px rgba(255,255,255,.95));
    }

    @keyframes flyHeart {
      0% {
        opacity: 0;
        transform: translate3d(0, 20px, 0) scale(.5) rotate(0deg);
      }
      12% { opacity: 1; }
      100% {
        opacity: 0;
        transform: translate3d(var(--dx), var(--dy), 0) scale(1.85) rotate(var(--rot));
      }
    }

    .loader {
      position: fixed;
      inset: 0;
      z-index: 99;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #02020d;
      color: white;
      transition: opacity .6s ease;
    }

    .loader.hide {
      opacity: 0;
      pointer-events: none;
    }

    .loader span {
      padding: 14px 22px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 0 30px rgba(255,80,190,.35);
    }

    @media (max-height: 720px) {
      .title { font-size: clamp(27px, 8vw, 40px); }
      .subtitle { font-size: 13px; margin-top: 7px; }
      .center-photo { width: min(54vw, 250px); height: min(54vw, 250px); }
      .hint { font-size: 12px; padding: 10px 12px; }
    }
  </style>
</head>
<body>

  <canvas id="space3d"></canvas>
  <div class="vignette"></div>

    <div class="subtitle">Kéo để xoay 360°. Vuốt 2 ngón để zoom vào từng ngôi sao kỷ niệm.</div>
  </div>

    let lastX = 0, lastY = 0;
    let lastTap = 0;
    let lastPinch = 0;
    let time = 0;

    const loveMessages = [
      "Em là ngôi sao đẹp nhất trong dải ngân hà của anh.",
      "Mỗi tấm ảnh là một vì sao, còn em là cả bầu trời trong tim anh.",
      "Anh muốn giữ những khoảnh khắc này sáng mãi như ngân hà.",
      "Dù vũ trụ có xoay bao nhiêu vòng, tim anh vẫn quay về phía em.",
      "Anh không cần tìm thêm vì sao nào nữa, vì anh đã tìm thấy em.",
      "Anh yêu em nhiều như những ngôi sao đang lấp lánh quanh chúng mình."
    ];
    let msgIndex = 0;

    function buildImageStars() {
      photoStarsWrap.innerHTML = "";
      imageNodes = IMAGE_STARS.map((src, i) => {
        const div = document.createElement("div");
        div.className = "photo-star";
        div.dataset.i = i;
        const img = document.createElement("img");
        img.src = src;
        img.alt = "Ngôi sao kỷ niệm " + (i + 1);
        div.appendChild(img);
        div.addEventListener("dblclick", showLove);
        div.addEventListener("click", () => {
          targetZoom = Math.min(2.55, Math.max(targetZoom, 1.65));
          msgIndex = i % loveMessages.length;
          loveText.textContent = loveMessages[msgIndex];
          createHearts(12);
        });
        photoStarsWrap.appendChild(div);
        return div;
      });
    }

    function resize() {
      W = canvas.width = window.innerWidth * devicePixelRatio;
      H = canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      CX = W / 2;
      CY = H / 2;
      createGalaxy();
    }

    function createGalaxy() {
      stars = [];
      dust = [];
      comets = [];

      const count = Math.floor(Math.min(7200, Math.max(4200, window.innerWidth * window.innerHeight / 82)));

      for (let i = 0; i < count; i++) {
        const arm = i % 5;
        const radius = Math.pow(Math.random(), 0.58) * 1040 + 8;
        const swirl = radius * 0.0125;
        const theta = arm * Math.PI * 2 / 5 + swirl + (Math.random() - .5) * 0.82;
        const spread = 18 + radius * .05;

        const x = Math.cos(theta) * radius + (Math.random() - .5) * spread;
        const z = Math.sin(theta) * radius + (Math.random() - .5) * spread;
        const y = (Math.random() - .5) * (26 + radius * .022);

        const temp = Math.random();
        let color;
        if (temp < .38) color = [255, 238, 255];
        else if (temp < .60) color = [120, 205, 255];
        else if (temp < .82) color = [255, 120, 215];
        else color = [255, 220, 120];

        stars.push({
          x, y, z,
          r: Math.random() * 1.35 + .32,
          color,
          tw: Math.random() * 6.28,
          speed: Math.random() * .025 + .007
        });
      }

      for (let i = 0; i < 760; i++) {
        const radius = Math.random() * 1050 + 25;
        const theta = Math.random() * Math.PI * 2;
        dust.push({
          x: Math.cos(theta) * radius,
          y: (Math.random() - .5) * 105,
          z: Math.sin(theta) * radius,
          r: Math.random() * 42 + 18,
          a: Math.random() * .065 + .025,
          color: Math.random() > .52 ? [255, 75, 195] : [70, 175, 255]
        });
      }

      for (let i = 0; i < 12; i++) {
        comets.push({
          x: -900 - Math.random() * 800,
          y: -260 + Math.random() * 520,
          z: -600 + Math.random() * 1200,
          speed: 2.5 + Math.random() * 4,
          delay: Math.random() * 400
        });
      }
    }

    function rotatePoint(p) {
      const cosY = Math.cos(angleY);
      const sinY = Math.sin(angleY);
      const cosX = Math.cos(angleX);
      const sinX = Math.sin(angleX);

      let x = p.x * cosY - p.z * sinY;
      let z = p.x * sinY + p.z * cosY;
      let y = p.y;

      let y2 = y * cosX - z * sinX;
      let z2 = y * sinX + z * cosX;

      return { x, y: y2, z: z2 };
    }

    function project(p) {
      const depth = 1480;
      const scale = (depth / (depth + p.z)) * zoom * devicePixelRatio;
      return {
        x: CX + p.x * scale,
        y: CY + p.y * scale,
        s: scale,
        z: p.z
      };
    }

    function drawBackground() {
      const g = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.max(W, H) * .72);
      g.addColorStop(0, "#1d1450");
      g.addColorStop(.36, "#06071e");
      g.addColorStop(1, "#010108");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      const n1 = ctx.createRadialGradient(W * .22, H * .28, 0, W * .22, H * .28, W * .58);
      n1.addColorStop(0, "rgba(255,70,190,.24)");
      n1.addColorStop(.45, "rgba(130,90,255,.10)");
      n1.addColorStop(1, "transparent");
      ctx.fillStyle = n1;
      ctx.fillRect(0, 0, W, H);

      const n2 = ctx.createRadialGradient(W * .78, H * .62, 0, W * .78, H * .62, W * .52);
      n2.addColorStop(0, "rgba(70,180,255,.20)");
      n2.addColorStop(.5, "rgba(255,110,210,.09)");
      n2.addColorStop(1, "transparent");
      ctx.fillStyle = n2;
      ctx.fillRect(0, 0, W, H);
    }

    function drawGalaxy() {
      const all = [];

      dust.forEach(d => {
        const rp = rotatePoint(d);
        const pp = project(rp);
        all.push({ type: "dust", data: d, pp });
      });

      stars.forEach(s => {
        s.tw += s.speed;
        const rp = rotatePoint(s);
        const pp = project(rp);
        all.push({ type: "star", data: s, pp });
      });

      all.sort((a, b) => a.pp.z - b.pp.z);

      all.forEach(item => {
        const pp = item.pp;
        if (pp.x < -180 || pp.x > W + 180 || pp.y < -180 || pp.y > H + 180) return;

        if (item.type === "dust") {
          const d = item.data;
          const r = d.r * pp.s * .38;
          const grd = ctx.createRadialGradient(pp.x, pp.y, 0, pp.x, pp.y, r);
          grd.addColorStop(0, `rgba(${d.color[0]},${d.color[1]},${d.color[2]},${d.a})`);
          grd.addColorStop(1, "transparent");
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(pp.x, pp.y, r, 0, Math.PI * 2);
          ctx.fill();
        } else {
          const s = item.data;
          const alpha = .42 + Math.sin(s.tw + time * .025) * .30 + Math.min(.28, pp.s * .075);
          const size = Math.max(.42, s.r * pp.s * 1.95);
          ctx.beginPath();
          ctx.fillStyle = `rgba(${s.color[0]},${s.color[1]},${s.color[2]},${Math.max(.10, alpha)})`;
          ctx.arc(pp.x, pp.y, size, 0, Math.PI * 2);
          ctx.fill();

          if (size > 1.1 && alpha > .57) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(${s.color[0]},${s.color[1]},${s.color[2]},${alpha * .19})`;
            ctx.moveTo(pp.x - size * 4.5, pp.y);
            ctx.lineTo(pp.x + size * 4.5, pp.y);
            ctx.moveTo(pp.x, pp.y - size * 4.5);
            ctx.lineTo(pp.x, pp.y + size * 4.5);
            ctx.stroke();
          }
        }
      });

      drawGalaxyCore();
      drawConstellations();
      drawComets();
    }

    function drawGalaxyCore() {
      const core = project(rotatePoint({ x:0, y:0, z:0 }));
      const r = 140 * core.s;
      const g = ctx.createRadialGradient(core.x, core.y, 0, core.x, core.y, r);
      g.addColorStop(0, "rgba(255,255,255,.95)");
      g.addColorStop(.13, "rgba(255,232,185,.50)");
      g.addColorStop(.38, "rgba(255,105,210,.22)");
      g.addColorStop(1, "transparent");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(core.x, core.y, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.translate(core.x, core.y);
      ctx.rotate(angleY * .8);
      const streak = ctx.createLinearGradient(-r*1.5, 0, r*1.5, 0);
      streak.addColorStop(0, "transparent");
      streak.addColorStop(.48, "rgba(255,255,255,.38)");
      streak.addColorStop(.52, "rgba(255,120,215,.42)");
      streak.addColorStop(1, "transparent");
      ctx.fillStyle = streak;
      ctx.fillRect(-r*1.5, -2*devicePixelRatio, r*3, 4*devicePixelRatio);
      ctx.restore();
    }

    function drawConstellations() {
      const groups = [
        [{x:-720,y:-145,z:-390},{x:-590,y:-245,z:-280},{x:-455,y:-190,z:-325},{x:-340,y:-285,z:-185}],
        [{x:450,y:-230,z:250},{x:545,y:-120,z:150},{x:680,y:-176,z:285},{x:710,y:-35,z:135}],
        [{x:-760,y:255,z:210},{x:-610,y:185,z:270},{x:-485,y:292,z:180},{x:-370,y:235,z:330}],
        [{x:250,y:260,z:-450},{x:360,y:180,z:-330},{x:505,y:240,z:-400},{x:590,y:140,z:-270}]
      ];

      ctx.save();
      ctx.lineWidth = 1.1 * devicePixelRatio;
      groups.forEach(group => {
        const pts = group.map(p => project(rotatePoint(p)));
        ctx.beginPath();
        pts.forEach((p, i) => {
          if (i === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        });
        ctx.strokeStyle = "rgba(255,255,255,.40)";
        ctx.stroke();

        pts.forEach(p => {
          ctx.beginPath();
          ctx.fillStyle = "rgba(255,255,255,.92)";
          ctx.arc(p.x, p.y, 3.1 * devicePixelRatio, 0, Math.PI * 2);
          ctx.fill();
        });
      });
      ctx.restore();
    }

    function drawComets() {
      comets.forEach(c => {
        if (time < c.delay) return;
        c.x += c.speed;
        c.y += c.speed * .22;
        if (c.x > 1200) {
          c.x = -1200 - Math.random() * 900;
          c.y = -350 + Math.random() * 700;
          c.z = -700 + Math.random() * 1400;
        }
        const p1 = project(rotatePoint(c));
        const p2 = project(rotatePoint({ x:c.x - 140, y:c.y - 30, z:c.z }));
        const grad = ctx.createLinearGradient(p2.x, p2.y, p1.x, p1.y);
        grad.addColorStop(0, "transparent");
        grad.addColorStop(1, "rgba(255,255,255,.75)");
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.7 * devicePixelRatio;
        ctx.beginPath();
        ctx.moveTo(p2.x, p2.y);
        ctx.lineTo(p1.x, p1.y);
        ctx.stroke();
      });
    }

    function updatePhotoStars() {
      IMAGE_POSITIONS.forEach((pos, i) => {
        const node = imageNodes[i];
        if (!node) return;

        const rp = rotatePoint(pos);
        const pp = project(rp);

        const depthVisibility = Math.max(.08, Math.min(1, (pp.s - .45) / 1.35));
        const zoomVisibility = Math.max(.16, Math.min(1, (zoom - .75) / 1.25));
        const opacity = Math.max(.16, Math.min(1, depthVisibility * .75 + zoomVisibility * .55));

        let size = pos.size * pp.s * .52;
        size = Math.max(18, Math.min(178, size));

        const sparkle = 1 + Math.sin(time * .04 + i * 1.7) * .055;
        const front = rp.z > -350;

        node.style.width = size + "px";
        node.style.height = size + "px";
        node.style.opacity = front ? opacity : opacity * .44;
        node.style.zIndex = String(front ? 5 : 3);
        node.style.transform =
          `translate3d(${pp.x / devicePixelRatio - size/2}px, ${pp.y / devicePixelRatio - size/2}px, 0) rotate(${pos.tilt + angleY*20}deg) scale(${sparkle})`;
        node.style.display = (pp.x < -220 || pp.x > W + 220 || pp.y < -220 || pp.y > H + 220) ? "none" : "block";
        node.classList.toggle("near", zoom > 1.45 && front);
      });
    }

    function draw() {
      time++;
      if (autoRotate) angleY += 0.0032;
      zoom += (targetZoom - zoom) * 0.085;

      drawBackground();
      drawGalaxy();
      updatePhotoStars();

      if (zoom > 1.62) {
        centerPhoto.classList.add("far");
        topText.classList.add("hide");
        hint.classList.add("hide");
      } else {
        centerPhoto.classList.remove("far");
        topText.classList.remove("hide");
        hint.classList.remove("hide");
      }

      requestAnimationFrame(draw);
    }

    function clientXY(e) {
      if (e.touches && e.touches.length) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    function pinchDistance(e) {
      if (!e.touches || e.touches.length < 2) return 0;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    function start(e) {
      autoRotate = false;

      if (e.touches && e.touches.length === 2) {
        lastPinch = pinchDistance(e);
        return;
      }

      const now = Date.now();
      if (now - lastTap < 285) {
        showLove();
        lastTap = 0;
        return;
      }
      lastTap = now;

      dragging = true;
      const p = clientXY(e);
      lastX = p.x;
      lastY = p.y;
    }

    function move(e) {
      e.preventDefault();

      if (e.touches && e.touches.length === 2) {
        const d = pinchDistance(e);
        if (lastPinch) {
          targetZoom += (d - lastPinch) * 0.0042;
          targetZoom = Math.max(.58, Math.min(2.85, targetZoom));
        }
        lastPinch = d;
        return;
      }

      if (!dragging) return;
      const p = clientXY(e);
      const dx = p.x - lastX;
      const dy = p.y - lastY;
      lastX = p.x;
      lastY = p.y;

      angleY += dx * 0.008;
      angleX += dy * 0.006;
      angleX = Math.max(-1.28, Math.min(1.28, angleX));
    }

    function end() {
      dragging = false;
      lastPinch = 0;
      setTimeout(() => autoRotate = true, 1500);
    }

    function wheel(e) {
      e.preventDefault();
      targetZoom += -e.deltaY * 0.001;
      targetZoom = Math.max(.58, Math.min(2.85, targetZoom));
    }

    function showLove() {
      msgIndex = (msgIndex + 1) % loveMessages.length;
      loveText.textContent = loveMessages[msgIndex];
      popup.classList.add("show");
      createHearts(58);
      targetZoom = Math.max(1.45, targetZoom);
    }

    function createHearts(n) {
      const icons = ["❤️","💖","💕","💗","💘","✨","🌟"];
      for (let i = 0; i < n; i++) {
        const h = document.createElement("div");
        h.className = "flying-heart";
        h.textContent = icons[Math.floor(Math.random() * icons.length)];

        const startX = window.innerWidth / 2 + (Math.random() - .5) * 90;
        const startY = window.innerHeight / 2 + (Math.random() - .5) * 95;
        const dx = (Math.random() - .5) * window.innerWidth * .95;
        const dy = -85 - Math.random() * window.innerHeight * .58;

        h.style.left = startX + "px";
        h.style.top = startY + "px";
        h.style.setProperty("--dx", dx + "px");
        h.style.setProperty("--dy", dy + "px");
        h.style.setProperty("--rot", (Math.random() * 240 - 120) + "deg");
        h.style.animationDelay = (Math.random() * .3) + "s";
        h.style.fontSize = (16 + Math.random() * 23) + "px";

        document.body.appendChild(h);
        setTimeout(() => h.remove(), 3150);
      }
    }

    closeBtn.addEventListener("click", () => {
      popup.classList.remove("show");
    });

    canvas.addEventListener("mousedown", start);
    canvas.addEventListener("mousemove", move);
    window.addEventListener("mouseup", end);
    canvas.addEventListener("touchstart", start, { passive: false });
    canvas.addEventListener("touchmove", move, { passive: false });
    canvas.addEventListener("touchend", end);
    canvas.addEventListener("wheel", wheel, { passive: false });
    window.addEventListener("resize", resize);

    buildImageStars();
    resize();
    draw();

    setTimeout(() => loader.classList.add("hide"), 850);
  </script>
</body>
</html>
